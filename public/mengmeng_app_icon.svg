<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for Gradients and Filters -->
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFF0F2" />
      <stop offset="60%" stop-color="#FFE5EB" />
      <stop offset="100%" stop-color="#FFD1DA" />
    </radialGradient>
    <linearGradient id="bearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE2DC" />
      <stop offset="100%" stop-color="#FFD2CC" />
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF0" />
      <stop offset="100%" stop-color="#FEF3C7" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#FF8FA3" flood-opacity="0.35" />
    </filter>
  </defs>

  <!-- Rounded rect back plate suitable for app icon grids -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Playful math sparkles in soft pastel color palettes -->
  <!-- Plus Symbol (+) -->
  <g fill="#FFA5B6" opacity="0.85" transform="translate(100, 240) rotate(15) scale(1.6)">
    <rect x="-4" y="-12" width="8" height="24" rx="4" />
    <rect x="-12" y="-4" width="24" height="8" rx="4" />
  </g>
  <!-- Minus Symbol (-) -->
  <g fill="#34D399" opacity="0.85" transform="translate(415, 275) rotate(-15) scale(1.6)">
    <rect x="-12" y="-4" width="24" height="8" rx="4" />
  </g>
  <!-- Equals Symbol (=) -->
  <g fill="#38BDF8" opacity="0.8" transform="translate(145, 95) rotate(-10) scale(1.5)">
    <rect x="-12" y="-6" width="24" height="5.5" rx="2.5" />
    <rect x="-12" y="1" width="24" height="5.5" rx="2.5" />
  </g>

  <!-- Mini cute glowing star -->
  <g transform="translate(370, 80) scale(1.6)">
    <path d="M 0,-10 L 3,-3 L 10,-3 L 5,2 L 7,9 L 0,5 L -7,9 L -5,2 L -10,-3 L -3,-3 Z" fill="url(#starGrad)" stroke="#FBBF24" stroke-width="1.5" stroke-linejoin="round" />
  </g>

  <!-- Teddy Bear Mascot -->
  <g filter="url(#shadow)">
    <!-- Ears -->
    <!-- Left Ear -->
    <circle cx="175" cy="185" r="48" fill="#FFC9C0" />
    <circle cx="175" cy="185" r="28" fill="#FFA5B6" />
    <!-- Right Ear -->
    <circle cx="337" cy="185" r="48" fill="#FFC9C0" />
    <circle cx="337" cy="185" r="28" fill="#FFA5B6" />

    <!-- Head Body -->
    <circle cx="256" cy="295" r="124" fill="url(#bearGrad)" />

    <!-- White Snout -->
    <ellipse cx="256" cy="335" rx="42" ry="28" fill="#FFFFFF" />

    <!-- Nose -->
    <ellipse cx="256" cy="321" rx="13" ry="8" fill="#2E2E3A" />

    <!-- Happy Cute Smiling Mouth -->
    <path d="M 242 338 Q 256 348 270 338" fill="none" stroke="#2E2E3A" stroke-width="7" stroke-linecap="round" />

    <!-- Twinkling Eyes with highlight sparkles -->
    <!-- Left Eye -->
    <ellipse cx="205" cy="275" rx="13" ry="18" fill="#2E2E3A" />
    <circle cx="201" cy="268" r="4.5" fill="#FFFFFF" />
    <circle cx="211" cy="281" r="2" fill="#FFFFFF" />
    <!-- Right Eye -->
    <ellipse cx="307" cy="275" rx="13" ry="18" fill="#2E2E3A" />
    <circle cx="303" cy="268" r="4.5" fill="#FFFFFF" />
    <circle cx="313" cy="281" r="2" fill="#FFFFFF" />

    <!-- Cute Blush Cheeks -->
    <ellipse cx="164" cy="316" rx="18" ry="11" fill="#FFA5B6" opacity="0.7" />
    <ellipse cx="348" cy="316" rx="18" ry="11" fill="#FFA5B6" opacity="0.7" />
  </g>

  <!-- Tiny cute paws hugging from the bottom edges -->
  <g fill="#FFE2DC" opacity="0.95">
    <ellipse cx="165" cy="420" rx="26" ry="18" transform="rotate(-15, 165, 420)" />
    <circle cx="152" cy="405" r="6" fill="#FFA5B6" />
    <circle cx="165" cy="400" r="6" fill="#FFA5B6" />
    <circle cx="178" cy="405" r="6" fill="#FFA5B6" />
    
    <ellipse cx="347" cy="420" rx="26" ry="18" transform="rotate(15, 347, 420)" />
    <circle cx="334" cy="405" r="6" fill="#FFA5B6" />
    <circle cx="347" cy="400" r="6" fill="#FFA5B6" />
    <circle cx="360" cy="405" r="6" fill="#FFA5B6" />
  </g>
</svg>
